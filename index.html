            <h2 className="text-3xl font-bold flex items-center">
              {isLost ? <AlertCircle className="mr-3" size={32} /> : <CheckCircle className="mr-3" size={32} />}
              {isLost ? 'Thông báo mất đồ' : 'Thông báo nhặt được đồ'}
            </h2>
          </div>

          <form onSubmit={handleSubmit} className={`p-8 space-y-8 ${!isLoggedIn ? 'opacity-30 pointer-events-none select-none' : ''}`}>
            <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner">
              <div className="flex items-center mb-4">
                <Lock size={18} className="text-gray-500 mr-2" />
                <h3 className="font-bold text-gray-800 text-lg">Thông tin liên hệ cá nhân</h3>
              </div>
              <p className="text-xs text-red-500 mb-5 font-bold">* Lưu ý: Họ và tên, Số điện thoại sẽ hiển thị công khai để dễ dàng liên lạc. Email sinh viên sẽ được bảo mật, chỉ Admin mới xem được.</p>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-1">Họ và tên *</label>
                  <input required type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm shadow-sm" value={formData.reporterName} onChange={e => setFormData({...formData, reporterName: e.target.value})} readOnly={isLoggedIn} />
                </div>
                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-1">Số điện thoại *</label>
                  <input required type="tel" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm shadow-sm" value={formData.reporterPhone} onChange={e => setFormData({...formData, reporterPhone: e.target.value})} readOnly={isLoggedIn} />
                </div>
              </div>
              <div className="mb-5">
                <label className="block text-sm font-bold text-gray-700 mb-1">Email sinh viên (Bảo mật) *</label>
                <input required type="email" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm shadow-sm bg-gray-100" value={formData.reporterEmail} onChange={e => setFormData({...formData, reporterEmail: e.target.value})} readOnly={isLoggedIn} />
              </div>
            </div>

            <hr className="border-gray-200" />

            <div>
              <h3 className="font-bold text-gray-800 text-lg mb-4 flex items-center"><Tag size={18} className="mr-2 text-blue-500" /> Chi tiết tài sản</h3>
              
              <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-5 rounded-2xl border border-blue-200 mb-6 shadow-sm relative overflow-hidden">
                <Sparkles className="absolute top-2 right-2 text-blue-300 opacity-50" size={32} />
                <label className="block text-sm font-extrabold text-blue-800 mb-1">✨ Điền nhanh bằng AI</label>
                <div className="flex gap-3 mt-2 relative z-10">
                  <textarea rows="2" placeholder="Ví dụ: Sáng nay rớt ví ở căn tin..." className="w-full p-3 border rounded-xl outline-none text-sm focus:ring-2 bg-white" value={aiInput} onChange={e => setAiInput(e.target.value)}></textarea>
                  <button type="button" onClick={handleAiFill} disabled={isGenerating} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold transition flex flex-col items-center justify-center min-w-[110px]">
                    {isGenerating ? <span>Đang xử lý...</span> : <><span>Phân tích</span><span className="text-xs">✨ AI</span></>}
                  </button>
                </div>
              </div>

              <div className="space-y-6">
                <input required type="text" placeholder="Tên đồ vật (Ngắn gọn) *" className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <select className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                    {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                  <select className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.campus} onChange={e => setFormData({...formData, campus: e.target.value})}>
                    {CAMPUSES.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>

                <input required type="text" placeholder="Khu vực chi tiết *" className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.specificLocation} onChange={e => setFormData({...formData, specificLocation: e.target.value})} />

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  <input required type="date" className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                  <select className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.timeFrame} onChange={e => setFormData({...formData, timeFrame: e.target.value})}>
                    {TIME_FRAMES.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>

                <textarea required rows="4" placeholder="Mô tả chi tiết đặc điểm..." className="w-full p-3 border rounded-xl outline-none text-sm shadow-sm" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}></textarea>

                <div>
                  <label className="block text-sm font-bold text-gray-700 mb-2">Hình ảnh đính kèm (Tải lên từ thiết bị)</label>
                  <label className="relative flex flex-col items-center justify-center w-full aspect-video border-2 border-dashed border-blue-300 rounded-2xl bg-blue-50/50 hover:bg-blue-50 cursor-pointer overflow-hidden transition-colors shadow-sm">
                    {previewImage ? (
                      <img src={previewImage} alt="Preview" className="w-full h-full object-cover" />
                    ) : (
                      <div className="text-center">
                        <ImageIcon className="mx-auto h-16 w-16 text-blue-400 mb-2" />
                        <span className="font-extrabold text-blue-600 text-lg">Click để tải ảnh lên</span>
                        <p className="text-xs text-gray-500 mt-2 font-medium">Khuyến nghị ảnh nằm ngang. Tối đa 5MB</p>
                      </div>
                    )}
                    <input type="file" className="hidden" accept="image/*" onChange={handleImageUpload} />
                  </label>
                </div>
              </div>
            </div>

            <div className="flex justify-end space-x-4 pt-6 border-t border-gray-200">
              <button type="button" onClick={onCancel} className="px-6 py-3 border rounded-xl font-bold hover:bg-gray-100">Hủy bỏ</button>
              <button type="submit" className={`px-6 py-3 rounded-xl text-white font-extrabold shadow-lg ${isLost ? 'bg-red-800 hover:bg-red-900' : 'bg-gradient-to-r from-green-500 to-emerald-600'}`}>
                Đăng thông báo
              </button>
            </div>
          </form>
        </div>
      );
    };

    // ==========================================
    // 3. BROWSE / SEARCH VIEW
    // ==========================================
    const BrowseView = ({ items, viewItemDetail, calendarDate, setCalendarDate, filterType, setFilterType }) => {
      const [filterCampus, setFilterCampus] = useState('all');
      const [filterCategory, setFilterCategory] = useState('all');
      const [filterTime, setFilterTime] = useState('all');
      const [searchTerm, setSearchTerm] = useState('');

      const systemCount = items.filter(i => {
        if (filterType === 'all') return true;
        return i.type === filterType;
      }).length;

      const startOfDay = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), calendarDate.getDate(), 0, 0, 0).getTime();
      const endOfDay = new Date(calendarDate.getFullYear(), calendarDate.getMonth(), calendarDate.getDate(), 23, 59, 59).getTime();

      const activeItems = items.filter(i => i.status !== 'resolved');

      const filteredItems = activeItems.filter(item => {
        if (item.timestamp < startOfDay || item.timestamp > endOfDay) return false;
        if (filterType !== 'all' && item.type !== filterType) return false;
        if (filterCampus !== 'all' && item.campus !== filterCampus) return false;
        if (filterCategory !== 'all' && item.category !== filterCategory) return false;
        if (filterTime !== 'all' && item.timeFrame !== filterTime) return false;
        if (searchTerm && !item.title.toLowerCase().includes(searchTerm.toLowerCase()) && !item.description.toLowerCase().includes(searchTerm.toLowerCase())) return false;
        return true;
      }).sort((a,b) => b.timestamp - a.timestamp);

      const handlePrevDay = () => {
        const newDate = new Date(calendarDate);
        newDate.setDate(newDate.getDate() - 1);
        setCalendarDate(newDate);
      };
      const handleNextDay = () => {
        const newDate = new Date(calendarDate);
        newDate.setDate(newDate.getDate() + 1);
        if (newDate <= CURRENT_REAL_DATE) setCalendarDate(newDate);
      };

      const themeColorText = filterType === 'found' ? 'text-blue-900' : 'text-teal-900';
      const themeColorBg = filterType === 'found' ? 'bg-blue-100' : 'bg-teal-100';
      const themeColorBorder = filterType === 'found' ? 'border-blue-200' : 'border-teal-200';
      const themeColorHighlight = filterType === 'found' ? 'text-blue-600' : 'text-teal-600';

      return (
        <div className="flex flex-col md:flex-row gap-6 animate-fade-in relative z-10">
          <div className="absolute inset-0 bg-sticker-search opacity-10 pointer-events-none z-0 mix-blend-overlay"></div>

          <div className={`w-full md:w-72 bg-white/95 backdrop-blur-md p-6 rounded-3xl shadow-xl border ${themeColorBorder} h-fit sticky top-24 z-10`}>
            <h3 className={`font-extrabold text-xl mb-5 flex items-center border-b border-gray-100 pb-4 ${themeColorText}`}><Filter size={20} className="mr-2"/> Bộ lọc tìm kiếm</h3>
            <div className="space-y-6 text-sm">
              <input type="text" placeholder="Nhập tên đồ vật..." className={`w-full p-3 border rounded-xl outline-none text-sm bg-gray-50 focus:ring-2 transition-all ${filterType === 'found' ? 'focus:border-blue-500 focus:ring-blue-100' : 'focus:border-teal-500 focus:ring-teal-100'}`} value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
              
              <div className="flex bg-gray-100 p-1.5 rounded-xl border border-gray-200 shadow-inner">
                <button className={`flex-1 py-2 rounded-lg transition-all ${filterType === 'all' ? 'bg-white shadow font-extrabold text-teal-700' : 'text-gray-600'}`} onClick={() => setFilterType('all')}>Tất cả</button>
                <button className={`flex-1 py-2 rounded-lg transition-all ${filterType === 'lost' ? 'bg-teal-600 text-white font-extrabold' : 'text-gray-600'}`} onClick={() => setFilterType('lost')}>Đồ mất</button>
                <button className={`flex-1 py-2 rounded-lg transition-all ${filterType === 'found' ? 'bg-blue-600 text-white font-extrabold' : 'text-gray-600'}`} onClick={() => setFilterType('found')}>Nhặt được</button>
              </div>

              <select className={`w-full p-3 border rounded-xl bg-gray-50 font-medium ${filterType === 'found' ? 'focus:border-blue-500' : 'focus:border-teal-500'}`} value={filterTime} onChange={e=>setFilterTime(e.target.value)}>
                <option value="all">Tất cả khung giờ</option>
                {TIME_FRAMES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              <select className={`w-full p-3 border rounded-xl bg-gray-50 font-medium ${filterType === 'found' ? 'focus:border-blue-500' : 'focus:border-teal-500'}`} value={filterCampus} onChange={e=>setFilterCampus(e.target.value)}>
                <option value="all">Tất cả cơ sở</option>
                {CAMPUSES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select className={`w-full p-3 border rounded-xl bg-gray-50 font-medium ${filterType === 'found' ? 'focus:border-blue-500' : 'focus:border-teal-500'}`} value={filterCategory} onChange={e=>setFilterCategory(e.target.value)}>
                <option value="all">Tất cả danh mục</option>
                {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>

          <div className="flex-grow flex flex-col gap-6 z-10">
            <div className={`bg-white/95 p-6 rounded-3xl backdrop-blur-md border shadow-md flex flex-col sm:flex-row items-center justify-between gap-4 ${themeColorBorder}`}>
               <div>
                 <h3 className={`${themeColorText} font-extrabold text-xl mb-1`}>Thống kê {filterType==='lost' ? 'báo mất' : filterType==='found' ? 'nhặt được' : 'chung'}</h3>
                 <p className={`${filterType === 'found' ? 'text-blue-700' : 'text-teal-700'} font-medium`}>Toàn hệ thống</p>
               </div>
               <div className={`${themeColorBg} ${filterType === 'found' ? 'text-blue-800' : 'text-teal-800'} px-6 py-3 rounded-2xl font-black text-3xl shadow-sm border ${themeColorBorder}`}>
                 {systemCount}
               </div>
            </div>

            <div className={`bg-white/90 p-4 rounded-2xl backdrop-blur-md border shadow-md flex flex-col xl:flex-row xl:items-center justify-between gap-4 ${themeColorBorder}`}>
              <div className="flex items-center gap-3">
                 <span className="text-gray-800 font-bold text-lg hidden sm:block">Danh sách Lịch: </span>
                 <div className={`flex items-center border rounded-xl overflow-hidden shadow-sm ${filterType === 'found' ? 'bg-blue-50 border-blue-200' : 'bg-teal-50 border-teal-200'}`}>
                    <button onClick={handlePrevDay} className={`p-2 transition ${filterType === 'found' ? 'hover:bg-blue-200 text-blue-800' : 'hover:bg-teal-200 text-teal-800'}`}><ChevronLeft size={20}/></button>
                    <span className={`px-4 py-1 font-bold ${filterType === 'found' ? 'text-blue-900' : 'text-teal-900'}`}>{formatDateString(calendarDate)}</span>
                    <button onClick={handleNextDay} className={`p-2 transition disabled:opacity-30 disabled:hover:bg-transparent ${filterType === 'found' ? 'hover:bg-blue-200 text-blue-800' : 'hover:bg-teal-200 text-teal-800'}`} disabled={calendarDate.toDateString() === CURRENT_REAL_DATE.toDateString()}><ChevronRight size={20}/></button>
                 </div>
              </div>
              <span className="text-sm text-gray-500 font-medium bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-100">
                 Tìm thấy <span className={`font-extrabold text-xl mx-1 ${themeColorHighlight}`}>{filteredItems.length}</span> kết quả
              </span>
            </div>
            
            {filteredItems.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredItems.map(item => <ItemCard key={item.id} item={item} onClick={() => viewItemDetail(item)} themeColorHighlight={themeColorHighlight} themeColorBorder={themeColorBorder} />)}
              </div>
            ) : (
              <div className={`bg-white/95 p-16 rounded-3xl text-center border shadow-xl backdrop-blur-md ${themeColorBorder}`}>
                <Search size={80} className={`mx-auto mb-6 ${filterType === 'found' ? 'text-blue-300' : 'text-teal-300'}`} />
                <h3 className="text-2xl font-extrabold text-gray-900 mb-2">Không tìm thấy đồ vật nào</h3>
              </div>
            )}
          </div>
        </div>
      );
    };

    const ItemCard = ({ item, onClick, themeColorHighlight, themeColorBorder }) => {
      const isLost = item.type === 'lost';
      return (
        <div onClick={onClick} className={`bg-white rounded-3xl shadow-lg hover:shadow-2xl transition-all duration-300 border border-gray-100 hover:${themeColorBorder} cursor-pointer overflow-hidden flex flex-col h-full group`}>
          <div className="relative h-48 w-full overflow-hidden bg-gray-200">
            <img src={item.image} alt={item.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-in-out" />
            <div className="absolute top-3 left-3">
              <span className={`text-[11px] uppercase font-extrabold px-3.5 py-1.5 rounded-full shadow-lg backdrop-blur-md border border-white/20 ${isLost ? 'bg-orange-500/95 text-white' : 'bg-green-600/95 text-white'}`}>
                {isLost ? 'Báo mất' : 'Nhặt được'}
              </span>
            </div>
          </div>
          <div className={`h-1.5 w-full ${isLost ? 'bg-gradient-to-r from-orange-400 to-orange-600' : 'bg-gradient-to-r from-green-500 to-emerald-600'}`}></div>
          <div className="p-6 flex-grow flex flex-col">
            <div className="flex justify-between items-center mb-3">
              <span className="text-xs text-gray-500 font-bold">{timeAgo(item.timestamp)}</span>
              <span className={`text-[10px] font-extrabold px-2.5 py-1 rounded-md ${isLost ? 'text-orange-700 bg-orange-50 border-orange-200' : 'text-green-700 bg-green-50 border-green-200'} border`}>{item.timeFrame.split(' ')[0]}</span>
            </div>
            <h3 className={`font-extrabold text-gray-900 mb-4 text-xl line-clamp-2 group-hover:${themeColorHighlight} transition-colors leading-snug`}>{item.title}</h3>
            <div className="space-y-2.5 mt-auto pt-4 border-t border-gray-100">
              <p className="text-[13px] text-gray-600 flex items-center font-bold"><MapPin size={16} className="mr-2 text-green-500"/> <span className="truncate">{item.campus}</span></p>
              <p className="text-[13px] text-gray-600 flex items-center font-bold"><Tag size={16} className={`mr-2 ${themeColorHighlight}`}/> {item.category}</p>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 4. ITEM DETAIL & PUBLIC CHAT
    // ==========================================
    const ItemDetail = ({ item, allItems, messages, onSendMessage, goBack, viewItemDetail, currentUser, isLoggedIn, handleResolveItem, handleInitiateClaim, openPrivateChat }) => {
      const [chatInput, setChatInput] = useState('');
      const [replyingTo, setReplyingTo] = useState(null); 
      
      if (!item) return null;
      const isLost = item.type === 'lost';
      
      const itemMessages = messages.filter(m => m.itemId === item.id && !m.threadId);

      const submitMessage = () => {
        if(chatInput.trim()) {
          let finalMsg = chatInput;
          if (replyingTo) finalMsg = `@${replyingTo}: ${chatInput}`;
          onSendMessage(null, item.id, finalMsg, item.title, item.author);
          setChatInput(''); setReplyingTo(null);
        }
      };

      const targetType = isLost ? 'found' : 'lost';
      const suggestedMatches = allItems.filter(i => {
        if (i.type !== targetType || i.id === item.id || i.status === 'resolved') return false;
        let matchScore = 0;
        if (i.category === item.category) matchScore++;
        if (i.campus === item.campus) matchScore++;
        if (i.timeFrame === item.timeFrame) matchScore++;
        return matchScore >= 2; 
      }).slice(0, 3);

      return (
        <div className="max-w-6xl mx-auto space-y-6 animate-fade-in pb-20 md:pb-0 relative z-10">
          <button onClick={goBack} className="text-white hover:text-teal-200 flex items-center text-sm font-extrabold transition-colors bg-white/10 border border-white/20 py-2.5 px-5 rounded-xl shadow-lg backdrop-blur-md w-fit">
            <ChevronRight size={18} className="rotate-180 mr-2" /> Quay lại tìm kiếm
          </button>

          <div className="grid lg:grid-cols-3 gap-8">
            <div className="lg:col-span-2 space-y-8">
              <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden">
                 <div className={`p-6 border-b flex flex-col md:flex-row md:justify-between items-start md:items-center gap-4 ${isLost ? 'bg-gradient-to-r from-orange-50 to-orange-100 border-orange-200' : 'bg-gradient-to-r from-green-50 to-green-100 border-green-200'}`}>
                    <div className="flex items-center">
                      {isLost ? <AlertCircle className="text-orange-600 mr-3" size={28}/> : <CheckCircle className="text-green-700 mr-3" size={28}/>}
                      <span className={`font-extrabold text-xl ${isLost ? 'text-orange-900' : 'text-green-900'}`}>
                        {isLost ? 'THÔNG TIN ĐỒ MẤT' : 'THÔNG TIN ĐỒ NHẶT ĐƯỢC'}
                      </span>
                    </div>

                    {item.status === 'resolved' ? (
                      <span className="bg-gray-600 text-white text-xs px-4 py-2 rounded-full font-bold shadow-md flex items-center"><CheckSquare size={16} className="mr-1.5"/> Đã được giải quyết/Gỡ xuống</span>
                    ) : (
                      currentUser && currentUser.name === item.author ? (
                        <button onClick={() => {if(window.confirm("Đánh dấu bài này là đã giải quyết? Hệ thống sẽ ẩn nó đi và cố gắng gỡ bài đối ứng nếu có trùng khớp.")){handleResolveItem(item)}}} className="text-sm font-bold px-4 py-2 rounded-xl text-white shadow-md transition hover:-translate-y-0.5 flex items-center bg-gray-800 hover:bg-gray-900">
                           <CheckSquare size={16} className="mr-2"/> Đánh dấu đã giải quyết (Gỡ bài)
                        </button>
                      ) : (
                        <button onClick={() => handleInitiateClaim(item, isLost)} className={`text-sm font-bold px-4 py-2 rounded-xl text-white shadow-md transition hover:-translate-y-0.5 flex items-center ${isLost ? 'bg-blue-600 hover:bg-blue-700' : 'bg-orange-500 hover:bg-orange-600'}`}>
                           <Zap size={16} className="mr-2"/> {isLost ? 'Tôi đã nhặt được món này' : 'Xác nhận đồ của tôi'}
                        </button>
                      )
                    )}
                 </div>
                 
                 <div className="p-8">
                    <div className="flex flex-col md:flex-row gap-8 mb-8">
                      <div className="w-full md:w-2/5 flex-shrink-0">
                        <div className="rounded-2xl overflow-hidden shadow-lg border border-gray-200 aspect-square relative group">
                          <img src={item.image} alt={item.title} className="w-full h-full object-cover" />
                        </div>
                      </div>
                      <div className="w-full md:w-3/5">
                        <h1 className="text-3xl font-black text-gray-900 mb-6">{item.title}</h1>
                        <div className="grid grid-cols-1 gap-y-4">
                          <div onClick={() => openPrivateChat(item)} className="bg-blue-50 border border-blue-100 p-4 rounded-xl flex flex-col sm:flex-row gap-4 hover:shadow-md hover:border-blue-300 transition cursor-pointer group relative">
                             <div className="absolute right-3 top-3 opacity-0 group-hover:opacity-100 transition"><MessageCircle className="text-blue-500" size={20}/></div>
                             <div className="flex-1">
                               <p className="text-xs text-blue-600 font-bold uppercase mb-1 flex items-center"><User size={14} className="mr-1"/> Người đăng</p>
                               <p className="text-base font-extrabold text-blue-900">{item.reporterName || item.author}</p>
                             </div>
                             <div className="w-px bg-blue-200 hidden sm:block"></div>
                             <div className="flex-1">
                               <p className="text-xs text-blue-600 font-bold uppercase mb-1 flex items-center"><Phone size={14} className="mr-1"/> Liên hệ</p>
                               <p className="text-base font-extrabold text-blue-900">{item.reporterPhone || 'Không cung cấp'}</p>
                             </div>
                          </div>
                          <p className="text-xs text-gray-400 italic font-bold ml-1">Nhấn vào ô trên để nhắn tin riêng trực tiếp với người đăng.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-y-5 gap-x-6 mt-6">
                          <DetailRow icon={<Tag/>} label="Danh mục" value={item.category} />
                          <DetailRow icon={<MapPin/>} label="Cơ sở" value={item.campus} />
                          <DetailRow icon={<MapPin className="opacity-50"/>} label="Khu vực" value={item.specificLocation} />
                          <DetailRow icon={<Clock/>} label="Khung giờ" value={`${item.timeFrame}`} />
                        </div>
                      </div>
                    </div>

                    <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-inner">
                      <h4 className="text-base font-extrabold text-gray-800 mb-3 flex items-center"><FileText size={20} className="mr-2 text-gray-500"/>Mô tả chi tiết:</h4>
                      <p className="text-gray-700 text-base whitespace-pre-line leading-relaxed font-medium">{item.description}</p>
                    </div>
                 </div>
              </div>

              {/* Chat Công khai */}
              <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 relative overflow-hidden">
                <Sparkles className="absolute top-5 right-5 text-teal-100 opacity-50" size={60} />
                <h3 className="font-extrabold text-2xl mb-6 flex items-center border-b border-gray-100 pb-4 text-gray-900 relative z-10">
                  <MessageCircle size={26} className="mr-3 text-teal-600"/> Bình luận công khai
                </h3>
                
                <div className="space-y-6 mb-8 max-h-[400px] overflow-y-auto pr-3 custom-scrollbar relative z-10">
                  {itemMessages.length === 0 ? (
                    <div className="text-center py-12 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-200">
                      <MessageSquare size={48} className="mx-auto text-gray-300 mb-4"/>
                      <p className="text-gray-500 font-bold text-lg">Chưa có bình luận nào. Hãy lên tiếng!</p>
                    </div>
                  ) : (
                    itemMessages.map(msg => (
                      <div key={msg.id} className="flex gap-4">
                        <div className="w-12 h-12 rounded-full bg-gradient-to-br from-teal-600 to-blue-700 flex items-center justify-center text-white font-bold text-base flex-shrink-0 shadow-lg border-2 border-white">
                          {msg.sender.charAt(0)}
                        </div>
                        <div className="flex-grow">
                          <div className="bg-gray-100 rounded-3xl px-5 py-3 inline-block max-w-[95%] border border-gray-200 shadow-sm">
                            <span className="font-extrabold text-[14px] text-gray-900 block mb-0.5">{msg.sender}</span>
                            <p className="text-[15px] text-gray-800 whitespace-pre-line">
                              {msg.text.startsWith('@') ? (
                                <>
                                  <span className="font-bold text-blue-600 mr-1">{msg.text.split(':')[0]}</span>
                                  {msg.text.substring(msg.text.indexOf(':') + 1)}
                                </>
                              ) : msg.text}
                            </p>
                          </div>
                          <div className="text-xs text-gray-500 mt-2 ml-4 flex items-center gap-5 font-bold">
                            <button onClick={() => setReplyingTo(msg.sender)} className="hover:text-teal-600 transition-colors">Phản hồi</button>
                            <span className="font-medium">{timeAgo(msg.timestamp)}</span>
                          </div>
                        </div>
                      </div>
                    ))
                  )}
                </div>

                <div className="flex items-start gap-4 mt-4 pt-6 border-t border-gray-100 relative z-10">
                  {replyingTo && (
                    <div className="absolute -top-6 left-16 bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-t-lg flex items-center shadow-sm">
                      Đang trả lời @{replyingTo}
                      <button onClick={() => setReplyingTo(null)} className="ml-2 hover:text-red-500"><X size={14}/></button>
                    </div>
                  )}
                  <div className="w-12 h-12 rounded-full bg-green-600 flex items-center justify-center text-white font-bold text-base flex-shrink-0 shadow-lg mt-1 border-2 border-white">
                    {currentUser ? currentUser.name.charAt(0) : 'U'}
                  </div>
                  <div className={`flex-grow flex flex-col bg-white border-2 rounded-3xl overflow-hidden transition-all shadow-md ${replyingTo ? 'border-blue-400 ring-2 ring-blue-100' : 'border-gray-200 focus-within:border-teal-500 focus-within:ring-2 focus-within:ring-teal-100'}`}>
                    <textarea 
                      rows="2"
                      placeholder="Viết bình luận công khai..." 
                      className="w-full px-5 py-4 bg-transparent outline-none text-base resize-none font-medium"
                      value={chatInput}
                      onChange={e => setChatInput(e.target.value)}
                      onKeyPress={e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitMessage(); } }}
                    />
                    <div className="flex justify-between items-center px-4 pb-4 bg-white">
                      <span className="text-sm font-bold text-gray-400 italic">Nhấn Enter để gửi</span>
                      <button onClick={submitMessage} disabled={!chatInput.trim()} className={`p-3 rounded-2xl transition-all shadow-md ${chatInput.trim() ? 'bg-teal-600 text-white hover:bg-teal-700 hover:scale-105' : 'bg-gray-200 text-gray-400'}`}>
                        <Send size={20} />
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="space-y-6">
              <div className="bg-white rounded-3xl shadow-2xl border border-teal-200 p-8 sticky top-24 relative overflow-hidden">
                <div className="absolute -bottom-10 -right-10 bg-sticker-star w-40 h-40 opacity-20 pointer-events-none"></div>
                <h3 className="font-extrabold text-teal-900 mb-4 flex items-center text-xl border-b border-teal-100 pb-4 relative z-10">
                  <Search size={24} className="mr-3 text-teal-500"/> Gợi ý có thể khớp
                </h3>
                <p className="text-sm text-gray-500 mb-4 font-medium relative z-10">Hệ thống AI tự động phân tích và liên kết các đồ vật trùng khớp 2/3 yếu tố.</p>
                <div className="space-y-4 relative z-10">
                  {suggestedMatches.length > 0 ? (
                    suggestedMatches.map(match => (
                      <div key={match.id} onClick={() => viewItemDetail(match)} className="bg-teal-50 p-5 rounded-2xl shadow-sm cursor-pointer hover:shadow-lg hover:border-teal-400 border border-transparent transition-all group">
                         <span className="text-xs uppercase font-black px-2.5 py-1 rounded-md inline-block mb-2 shadow-sm bg-orange-200 text-orange-800">{match.type === 'lost' ? 'Đang tìm' : 'Nhặt được'}</span>
                         <h4 className="font-bold text-base text-gray-900 line-clamp-2 mb-2 group-hover:text-teal-700 transition-colors">{match.title}</h4>
                      </div>
                    ))
                  ) : (
                    <div className="text-center p-8 bg-gray-50 rounded-2xl border-2 border-gray-200 border-dashed">
                      <p className="text-sm text-gray-500 font-bold">Chưa có gợi ý nào phù hợp cao.</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const DetailRow = ({ icon, label, value }) => (
      <div className="flex items-start">
        <div className="text-gray-500 mt-1 mr-3 bg-gray-100 p-2 rounded-xl shadow-inner">{React.cloneElement(icon, { size: 18 })}</div>
        <div>
          <p className="text-xs text-gray-500 font-bold mb-0.5 uppercase tracking-wide">{label}</p>
          <p className="text-sm font-extrabold text-gray-900">{value}</p>
        </div>
      </div>
    );

    // ==========================================
    // 5. STATS VIEW
    // ==========================================
    const StatsView = ({ items }) => {
      const totalLost = items.filter(i => i.type === 'lost' && i.status !== 'resolved').length;
      const totalFound = items.filter(i => i.type === 'found' && i.status !== 'resolved').length;
      const resolved = items.filter(i => i.status === 'resolved').length;
      const total = items.length;
      
      return (
        <div className="max-w-6xl mx-auto space-y-10 animate-fade-in relative z-10">
          <div className="text-center mb-12 bg-white/10 backdrop-blur-md p-8 rounded-3xl border border-white/20 shadow-2xl relative overflow-hidden">
            <div className="absolute inset-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1200')] bg-cover"></div>
            <h2 className="relative z-10 text-4xl font-black text-white mb-3 drop-shadow-md">Thống kê Dữ liệu UEH</h2>
            <p className="relative z-10 text-red-100 font-bold text-lg drop-shadow-md">Tổng quan tình hình đồ thất lạc & Giải quyết thành công</p>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-3 gap-8">
            <StatCard title="Đang báo mất" value={totalLost} color="orange" icon={<AlertCircle/>} />
            <StatCard title="Đang nhặt được" value={totalFound} color="green" icon={<CheckCircle/>} />
            <StatCard title="Đã Giải Quyết" value={resolved} color="blue" icon={<HeartHandshake/>} />
          </div>

          <div className="grid md:grid-cols-2 gap-10">
            <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 p-10 relative overflow-hidden">
              <div className="absolute top-0 right-0 bg-sticker-star w-32 h-32 opacity-10 pointer-events-none -mr-10 -mt-10"></div>
              <h3 className="font-black text-2xl mb-8 flex items-center text-gray-900 border-b border-gray-100 pb-4 relative z-10"><BarChart2 className="mr-3 text-red-600" size={28}/> Tỉ lệ theo loại đồ vật</h3>
              <div className="space-y-6 relative z-10">
                {CATEGORIES.map(cat => {
                  const count = items.filter(i => i.category === cat).length;
                  const percent = total > 0 ? Math.round((count / total) * 100) : 0;
                  if (count === 0) return null;
                  return (
                    <div key={cat}>
                      <div className="flex justify-between text-sm mb-2">
                        <span className="font-extrabold text-gray-800">{cat}</span>
                        <span className="text-gray-600 font-bold bg-gray-100 px-2 py-0.5 rounded-md">{count} mục ({percent}%)</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-4 shadow-inner">
                        <div className="bg-gradient-to-r from-red-500 to-orange-500 h-4 rounded-full shadow-md" style={{ width: `${percent}%` }}></div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="bg-gradient-to-br from-red-50 to-orange-50 p-10 rounded-3xl shadow-2xl border border-red-200 relative overflow-hidden">
              <Trophy size={250} className="absolute top-0 right-0 opacity-10 text-red-700 -mr-10 -mt-10" />
              <div className="relative z-10">
                <h3 className="font-black text-3xl mb-3 flex items-center text-red-900"><Trophy className="mr-4 text-yellow-500" size={32}/> Bảng Vàng Vinh Danh</h3>
                <p className="text-base text-red-800 mb-8 font-bold">Sinh viên có nhiều đóng góp giải quyết đồ vật nhất</p>
                <div className="bg-white/80 backdrop-blur p-6 rounded-2xl shadow-xl text-center border-2 border-dashed border-red-200">
                  <p className="text-red-600 font-bold">Bảng vàng sẽ hiển thị khi có dữ liệu thật.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const StatCard = ({ title, value, color, icon }) => {
      const colors = {
        orange: 'bg-gradient-to-br from-orange-50 to-orange-100 text-orange-800 border-orange-200',
        green: 'bg-gradient-to-br from-green-50 to-green-100 text-green-800 border-green-200',
        blue: 'bg-gradient-to-br from-blue-50 to-blue-100 text-blue-800 border-blue-200',
      };
      return (
        <div className={`p-8 rounded-3xl border ${colors[color]} flex items-center justify-between shadow-xl relative overflow-hidden transition-transform hover:-translate-y-1`}>
          <div className="relative z-10">
            <p className="text-sm font-black opacity-80 mb-2 uppercase tracking-wider">{title}</p>
            <p className="text-6xl font-black drop-shadow-md">{value}</p>
          </div>
          <div className="opacity-20 absolute right-4 bottom-4">{React.cloneElement(icon, { size: 100 })}</div>
        </div>
      );
    };


    // ==========================================
    // 6. PROFILE VIEW (INBOX MESSENGER)
    // ==========================================
    const ProfileView = ({ user, items, messages, onSendMessage, onReaction, isLoggedIn, setIsLoggedIn, setCurrentUser, updateUser, db, appId, firebaseUser, isConfigured, navToChat, setNavToChat }) => {
      const [activeTab, setActiveTab] = useState('info'); 
      const [activeChat, setActiveChat] = useState(null); 
      const [chatInput, setChatInput] = useState('');

      const [isEditingProfile, setIsEditingProfile] = useState(false);
      const [editData, setEditData] = useState({});

      const myItems = items.filter(i => user && i.author === user.name);
      
      const myInvolvedItems = items.filter(item => {
        if(!user) return false;
        const isAuthor = item.authorEmail === user.email;
        const hasThread = messages.some(m => m.itemId === item.id && m.threadId && m.threadId.includes(user.email));
        return (isAuthor && messages.some(m=>m.itemId===item.id && m.threadId)) || hasThread;
      });

      const [isLoginMode, setIsLoginMode] = useState(true);
      const [authData, setAuthData] = useState({ name: '', email: '', phone: '', major: '', classInfo: '', studentId: '', password: '' });
      const [authError, setAuthError] = useState('');
      const [reportFormData, setReportFormData] = useState({ issue: 'Nghi ngờ lừa đảo / Tống tiền', details: '' });

      useEffect(() => { if (user) setEditData({...user}); }, [user]);

      useEffect(() => {
        if(navToChat) {
          setActiveTab('messages');
          setActiveChat(navToChat);
          setNavToChat(null);
        }
      }, [navToChat]);

      const handleAuth = async (e) => {
        e.preventDefault();
        if (!isConfigured) { setAuthError('Vui lòng thiết lập firebaseConfig trong code (GitHub Pages) để đăng ký/đăng nhập.'); return; }
        setAuthError('');
        if (!authData.password) { setAuthError('Vui lòng nhập mật khẩu.'); return; }

        const userId = authData.email.replace(/[@.]/g, '_');
        const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'ueh_users', userId);

        try {
          const docSnap = await getDoc(userRef);

          if (isLoginMode) {
            if (docSnap.exists()) {
               const existingData = docSnap.data();
               if (existingData.password !== authData.password) { setAuthError('Mật khẩu không chính xác!'); return; }
               setCurrentUser(existingData);
               localStorage.setItem('ueh_current_user', JSON.stringify(existingData));
               setIsLoggedIn(true);
            } else { setAuthError('Tài khoản không tồn tại. Vui lòng đăng ký mới!'); }
          } else {
            if (docSnap.exists()) { setAuthError('Email này đã được đăng ký!'); return; }
            const newUserData = { 
              name: authData.name, id: userId, email: authData.email, phone: authData.phone, 
              studentId: authData.studentId, major: authData.major, classInfo: authData.classInfo, password: authData.password, avatar: null 
            };
            await setDoc(userRef, newUserData);
            setCurrentUser(newUserData);
            localStorage.setItem('ueh_current_user', JSON.stringify(newUserData));
            setIsLoggedIn(true);
          }
        } catch (error) { setAuthError('Có lỗi xảy ra, vui lòng bật cho phép ghi Database trên Firebase.'); }
      };

      const handleSaveProfile = async () => {
        try {
          const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'ueh_users', user.id);
          await updateDoc(userRef, editData);
          setCurrentUser(editData);
          localStorage.setItem('ueh_current_user', JSON.stringify(editData));
          setIsEditingProfile(false);
          alert('Đã cập nhật thông tin thành công!');
        } catch (error) { alert('Lỗi cập nhật thông tin!'); }
      };

      const handleLogout = () => { setIsLoggedIn(false); setCurrentUser(null); localStorage.removeItem('ueh_current_user'); };

      const handleAvatarChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = async () => {
            const base64String = reader.result;
            const updatedUser = { ...user, avatar: base64String };
            updateUser(updatedUser);
            localStorage.setItem('ueh_current_user', JSON.stringify(updatedUser));
            if (firebaseUser && user.id) {
               try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ueh_users', user.id), { avatar: base64String }); } catch (e) {}
            }
          };
          reader.readAsDataURL(file);
        }
      };

      const handleReportSubmit = (e) => {
        e.preventDefault();
        if(reportFormData.details.trim() === '') { alert("Vui lòng nhập chi tiết khiếu nại."); return; }
        alert(`Đã gửi khiếu nại thành công đến Admin UEH Reconnect!\nVấn đề: ${reportFormData.issue}`);
        setReportFormData({ issue: 'Nghi ngờ lừa đảo / Tống tiền', details: '' });
      };

      if (!isLoggedIn) {
        return (
          <div className="max-w-xl mx-auto bg-white p-10 rounded-3xl shadow-2xl border border-gray-100 animate-fade-in mt-10 relative z-10">
            <div className="text-center mb-8">
               <div className="bg-blue-100 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-5 border-2 border-blue-200 shadow-inner">
                 <User size={40} className="text-blue-600" />
               </div>
               <h2 className="text-3xl font-black text-gray-900">{isLoginMode ? 'Đăng Nhập Hệ Thống' : 'Đăng Ký Tài Khoản'}</h2>
               <p className="text-gray-500 text-sm mt-2 font-medium">Vui lòng điền thông tin để quản lý tài sản</p>
            </div>

            {authError && (
              <div className="bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl mb-6 text-sm font-bold flex items-start shadow-sm">
                <AlertCircle size={20} className="mr-3 flex-shrink-0 mt-0.5"/> <div>{authError}</div>
              </div>
            )}
            
            {!isConfigured && (
               <div className="bg-orange-50 border border-orange-200 text-orange-800 p-4 rounded-xl mb-6 text-sm font-bold shadow-sm flex items-start">
                 <ShieldAlert size={20} className="mr-3 flex-shrink-0 mt-0.5"/>
                 <div>⚠️ Web ngoài (GitHub Pages): Vui lòng điền "firebaseConfig" vào mã nguồn (file HTML) để tạo tài khoản và lưu trữ thật.</div>
               </div>
            )}

            <form onSubmit={handleAuth} className="space-y-4">
              {!isLoginMode && (
                <div className="grid grid-cols-2 gap-4">
                   <div>
                     <label className="block text-xs font-extrabold text-gray-700 mb-1">Họ và tên *</label>
                     <input required type="text" placeholder="Nguyễn Văn A" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.name} onChange={e => setAuthData({...authData, name: e.target.value})} />
                   </div>
                   <div>
                     <label className="block text-xs font-extrabold text-gray-700 mb-1">Mã số SV *</label>
                     <input required type="text" placeholder="312xxxx" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.studentId} onChange={e => setAuthData({...authData, studentId: e.target.value})} />
                   </div>
                </div>
              )}
              <div>
                <label className="block text-xs font-extrabold text-gray-700 mb-1">Email sinh viên *</label>
                <input required type="email" placeholder="st.ueh.edu.vn" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.email} onChange={e => setAuthData({...authData, email: e.target.value})} />
              </div>
              {!isLoginMode && (
                <>
                  <div>
                    <label className="block text-xs font-extrabold text-gray-700 mb-1">Số điện thoại *</label>
                    <input required type="tel" placeholder="0901234567" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.phone} onChange={e => setAuthData({...authData, phone: e.target.value})} />
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-extrabold text-gray-700 mb-1">Chuyên ngành</label>
                      <input type="text" placeholder="VD: Kinh doanh..." className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.major} onChange={e => setAuthData({...authData, major: e.target.value})} />
                    </div>
                    <div>
                      <label className="block text-xs font-extrabold text-gray-700 mb-1">Lớp</label>
                      <input type="text" placeholder="VD: IB01" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.classInfo} onChange={e => setAuthData({...authData, classInfo: e.target.value})} />
                    </div>
                  </div>
                </>
              )}
              <div>
                <label className="block text-xs font-extrabold text-gray-700 mb-1">Mật khẩu *</label>
                <input required type="password" placeholder="Nhập mật khẩu" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 text-sm font-medium bg-gray-50" value={authData.password} onChange={e => setAuthData({...authData, password: e.target.value})} />
              </div>
              <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-xl mt-6 text-lg transition-transform hover:-translate-y-1">
                {isLoginMode ? 'Đăng Nhập' : 'Hoàn Tất Đăng Ký'}
              </button>
            </form>
            <div className="mt-6 text-center">
               <button onClick={() => {setIsLoginMode(!isLoginMode); setAuthError('');}} className="text-sm font-bold text-blue-600 hover:underline">
                 {isLoginMode ? 'Chưa có tài khoản? Đăng ký người dùng mới' : 'Đã có tài khoản? Đăng nhập ngay'}
               </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-6xl mx-auto animate-fade-in flex flex-col md:flex-row gap-8 relative z-10">
          <div className="w-full md:w-1/3 space-y-8">
            <div className="bg-white rounded-3xl shadow-2xl border border-blue-100 text-center relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-r from-blue-700 via-blue-600 to-indigo-600 z-0"></div>
              <div className="relative z-10 flex flex-col items-center mt-12 pb-6">
                <label className="bg-white p-1.5 rounded-full shadow-2xl mb-5 cursor-pointer relative group border-4 border-white">
                  <div className="bg-blue-50 w-28 h-28 rounded-full flex items-center justify-center text-blue-700 overflow-hidden relative">
                    {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover" /> : <User size={56} />}
                    <div className="absolute inset-0 bg-black/50 hidden group-hover:flex items-center justify-center"><Camera size={28} className="text-white"/></div>
                  </div>
                  <input type="file" className="hidden" accept="image/*" onChange={handleAvatarChange} />
                </label>
                <h2 className="text-2xl font-black text-gray-900">{user.name}</h2>
                <p className="text-blue-600 font-extrabold text-sm mb-2 mt-1">{user.classInfo ? `Lớp: ${user.classInfo}` : ''}</p>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden flex flex-col p-2">
              <ProfileTabBtn active={activeTab === 'info'} onClick={() => {setActiveTab('info'); setIsEditingProfile(false);}} icon={<User size={20}/>} label="Thông tin cá nhân" />
              <ProfileTabBtn active={activeTab === 'history'} onClick={() => setActiveTab('history')} icon={<History size={20}/>} label={`Lịch sử hoạt động (${myItems.length})`} />
              <ProfileTabBtn active={activeTab === 'messages'} onClick={() => setActiveTab('messages')} icon={<MessageCircle size={20}/>} label="Tin nhắn cá nhân & Thông báo" badge={myInvolvedItems.length > 0 ? myInvolvedItems.length : null} />
              <ProfileTabBtn active={activeTab === 'report'} onClick={() => setActiveTab('report')} icon={<ShieldAlert size={20}/>} label="Hỗ trợ & Khiếu nại" />
            </div>
          </div>

          <div className="w-full md:w-2/3">
            <div className="bg-white p-6 sm:p-10 rounded-3xl shadow-2xl border border-gray-100 min-h-[600px] flex flex-col">
              
              {activeTab === 'info' && (
                <div className="animate-fade-in space-y-8">
                  <div className="flex justify-between items-center border-b-2 border-gray-100 pb-5">
                     <h3 className="font-black text-3xl text-gray-900 flex items-center"><User className="mr-3 text-blue-600" size={32}/> Hồ sơ sinh viên</h3>
                     {!isEditingProfile && (
                       <button onClick={() => setIsEditingProfile(true)} className="bg-gray-100 hover:bg-gray-200 text-gray-800 px-4 py-2 rounded-lg text-sm font-bold transition flex items-center">
                         <Edit3 size={16} className="mr-2"/> Chỉnh sửa
                       </button>
                     )}
                  </div>
                  
                  {!isEditingProfile ? (
                    <>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <InfoField icon={<User size={20}/>} label="Họ và tên" value={user.name} />
                        <InfoField icon={<Tag size={20}/>} label="Mã số sinh viên" value={user.studentId} />
                        <InfoField icon={<Mail size={20}/>} label="Email sinh viên" value={user.email} />
                        <InfoField icon={<Phone size={20}/>} label="Số điện thoại" value={user.phone} />
                        <InfoField icon={<Tag size={20}/>} label="Chuyên ngành" value={user.major} />
                        <InfoField icon={<Tag size={20}/>} label="Lớp" value={user.classInfo} />
                        <InfoField icon={<Lock size={20}/>} label="Mật khẩu" value={user.password.replace(/./g, '*')} />
                      </div>
                      <div className="pt-8 border-t-2 border-gray-100 flex justify-end mt-8">
                        <button onClick={handleLogout} className="bg-red-50 hover:bg-red-100 text-red-600 px-6 py-3.5 rounded-xl text-sm font-black transition shadow-sm border border-red-100">Đăng xuất tài khoản</button>
                      </div>
                    </>
                  ) : (
                    <div className="space-y-5 bg-gray-50 p-6 rounded-2xl border border-gray-200">
                       <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Họ và tên</label>
                           <input type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium" value={editData.name || ''} onChange={e=>setEditData({...editData, name: e.target.value})} />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Mã số sinh viên</label>
                           <input type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium" value={editData.studentId || ''} onChange={e=>setEditData({...editData, studentId: e.target.value})} />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Số điện thoại</label>
                           <input type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium" value={editData.phone || ''} onChange={e=>setEditData({...editData, phone: e.target.value})} />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Email (Không thể sửa)</label>
                           <input type="text" className="w-full p-3 border rounded-xl bg-gray-200 text-gray-500 font-medium cursor-not-allowed" value={editData.email || ''} readOnly />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Chuyên ngành</label>
                           <input type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium" value={editData.major || ''} onChange={e=>setEditData({...editData, major: e.target.value})} />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Lớp</label>
                           <input type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium" value={editData.classInfo || ''} onChange={e=>setEditData({...editData, classInfo: e.target.value})} />
                         </div>
                         <div>
                           <label className="block text-xs font-bold text-gray-700 mb-1">Mật khẩu</label>
                           <input type="text" className="w-full p-3 border rounded-xl outline-none focus:border-blue-500 font-medium" value={editData.password || ''} onChange={e=>setEditData({...editData, password: e.target.value})} />
                         </div>
                       </div>
                       <div className="flex gap-3 justify-end pt-4">
                         <button onClick={() => setIsEditingProfile(false)} className="px-5 py-2.5 bg-white border border-gray-300 rounded-xl font-bold hover:bg-gray-100 transition">Hủy</button>
                         <button onClick={handleSaveProfile} className="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold flex items-center hover:bg-blue-700 transition">
                           <Save size={18} className="mr-2"/> Lưu thay đổi
                         </button>
                       </div>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 'history' && (
                <div className="animate-fade-in space-y-6">
                  <h3 className="font-black text-3xl text-gray-900 border-b-2 border-gray-100 pb-5 flex items-center"><History className="mr-3 text-blue-600" size={32}/> Lịch sử hoạt động</h3>
                  {myItems.length > 0 ? (
                    <div className="space-y-5">
                      {myItems.map(item => (
                        <div key={item.id} className="p-5 rounded-3xl border border-gray-200 hover:border-blue-400 transition-colors bg-gray-50 flex flex-col sm:flex-row justify-between sm:items-center gap-5 shadow-sm hover:shadow-md">
                          <div className="flex items-center gap-5">
                            <img src={item.image || "https://images.unsplash.com/photo-1584438784894-089d6a62b8fa?w=100&q=80"} alt="" className="w-20 h-20 rounded-2xl object-cover border-2 border-white shadow-sm"/>
                            <div>
                              <div className="flex items-center space-x-3 mb-2">
                                <span className={`text-[10px] uppercase font-black px-2.5 py-1 rounded-md shadow-sm border ${item.type === 'lost' ? 'bg-orange-100 text-orange-800 border-orange-200' : 'bg-green-100 text-green-800 border-green-200'}`}>
                                  {item.type === 'lost' ? 'Báo mất' : 'Nhặt được'}
                                </span>
                                <span className="font-extrabold text-gray-900 text-xl">{item.title}</span>
                              </div>
                              <p className="text-sm text-gray-500 font-bold">{item.date} • {item.campus}</p>
                              {item.status === 'resolved' && <span className="text-xs font-bold text-green-600 mt-1 inline-block">✓ Đã giải quyết</span>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="text-center py-16 bg-gray-50 rounded-3xl border-2 border-dashed border-gray-200">
                      <History size={80} className="mx-auto text-gray-300 mb-5"/>
                      <p className="text-gray-500 font-bold text-lg">Bạn chưa có bài đăng nào trong lịch sử.</p>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 'messages' && (
                <div className="animate-fade-in h-full flex flex-col flex-grow">
                  <h3 className="font-black text-2xl text-gray-900 border-b-2 border-gray-100 pb-4 flex items-center mb-4"><MessageCircle className="mr-3 text-indigo-600" size={28}/> Tin nhắn cá nhân & Thông báo</h3>
                  
                  {!activeChat ? (
                    <div className="flex-grow space-y-3 overflow-y-auto">
                      {myInvolvedItems.length > 0 ? myInvolvedItems.map(item => {
                        const itemThreads = [...new Set(messages.filter(m => m.itemId === item.id && m.threadId && m.threadId.includes(user.email)).map(m=>m.threadId))];
                        
                        if(itemThreads.length > 0) {
                           return itemThreads.map(thread => {
                             const threadMsgs = messages.filter(m => m.threadId === thread);
                             const lastMsg = threadMsgs[threadMsgs.length - 1];
                             const otherPerson = threadMsgs.find(m => m.senderEmail !== user.email)?.sender || 'Người liên hệ';

                             return (
                                <div key={thread} onClick={() => setActiveChat({ item, threadId: thread, otherPerson })} className="p-4 rounded-2xl border border-gray-200 hover:border-indigo-400 bg-white cursor-pointer flex items-center gap-4 transition-all shadow-sm">
                                  <div className="w-14 h-14 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-xl flex-shrink-0 shadow-md">
                                    {otherPerson.charAt(0)}
                                  </div>
                                  <div className="flex-grow min-w-0">
                                    <h4 className="font-extrabold text-gray-900 truncate text-base">{otherPerson}</h4>
                                    <p className="text-xs text-gray-400 font-bold mb-1">Vật phẩm: {item.title}</p>
                                    <p className="text-sm text-gray-600 truncate font-medium">{lastMsg.sender === user.name ? 'Bạn: ' : ''}{lastMsg.text}</p>
                                  </div>
                                  <ChevronRight className="text-gray-300" />
                                </div>
                             );
                           })
                        }
                        return null;
                      }) : (
                        <div className="text-center py-20"><MessageSquare size={64} className="mx-auto text-gray-200 mb-4"/><p className="font-bold text-gray-500">Bạn chưa có hội thoại cá nhân nào.</p></div>
                      )}
                    </div>
                  ) : (
                    <div className="flex flex-col h-[500px] border border-gray-200 rounded-3xl overflow-hidden bg-white shadow-xl relative">
                       <div className="bg-white p-4 border-b border-gray-100 flex items-center shadow-sm z-10">
                         <button onClick={() => setActiveChat(null)} className="mr-3 p-2 rounded-full hover:bg-gray-100 text-gray-500 hover:text-indigo-600 transition"><ChevronLeft size={24}/></button>
                         <div className="flex items-center gap-3">
                           <div className="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold">
                              {activeChat.otherPerson.charAt(0)}
                           </div>
                           <div>
                             <p className="font-extrabold text-gray-900 leading-tight text-lg">{activeChat.otherPerson}</p>
                             <p className="text-xs text-indigo-500 font-bold bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100">Đồ vật: {activeChat.item.title}</p>
                           </div>
                         </div>
                       </div>
                       
                       <div className="flex-grow p-6 space-y-6 overflow-y-auto custom-scrollbar bg-gray-50 relative">
                         <div className="absolute inset-0 bg-sticker-cloud opacity-[0.03] pointer-events-none"></div>
                         
                         {messages.filter(m => m.threadId === activeChat.threadId).map(msg => {
                           const isMe = msg.senderEmail === user.email;
                           return (
                             <div key={msg.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'} group relative`}>
                               <div className={`px-5 py-3 rounded-3xl max-w-[80%] font-medium shadow-sm relative ${isMe ? 'bg-indigo-600 text-white rounded-br-sm' : 'bg-white text-gray-800 border border-gray-200 rounded-bl-sm'}`}>
                                 <span className="whitespace-pre-line leading-relaxed">{msg.text}</span>
                               </div>
                               <span className="text-[10px] font-bold text-gray-400 mt-1 mx-2">{timeAgo(msg.timestamp)}</span>
                               
                               {isConfigured && (
                                 <div className={`absolute top-2 ${isMe ? '-left-10' : '-right-10'} opacity-0 group-hover:opacity-100 transition-opacity flex gap-1`}>
                                   <button onClick={() => onReaction(msg.id, '❤️')} className="p-1.5 bg-white rounded-full shadow-md hover:scale-110 transition"><Heart size={16} className="text-red-500"/></button>
                                   <button onClick={() => onReaction(msg.id, '👍')} className="p-1.5 bg-white rounded-full shadow-md hover:scale-110 transition"><ThumbsUp size={16} className="text-blue-500"/></button>
                                 </div>
                               )}
                               
                               {msg.reactions && msg.reactions.length > 0 && (
                                 <div className={`absolute -bottom-3 ${isMe ? 'right-4' : 'left-4'} bg-white px-2 py-0.5 rounded-full shadow-md text-xs border border-gray-100 flex items-center`}>
                                    <span className="font-bold ml-1 text-gray-600">{msg.reactions.join(' ')} {msg.reactions.length}</span>
                                 </div>
                               )}
                             </div>
                           )
                         })}
                       </div>

                       <div className="p-4 bg-white border-t border-gray-100 flex items-center gap-3 z-10">
                         <input type="text" placeholder="Nhập tin nhắn..." className="flex-grow bg-gray-100 p-3.5 rounded-full outline-none font-medium px-5 focus:ring-2 focus:ring-indigo-100 transition" value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyPress={e => {if(e.key==='Enter' && chatInput) { onSendMessage(activeChat.threadId, activeChat.item.id, chatInput, activeChat.item.title, activeChat.item.author); setChatInput('');}}} />
                         <button onClick={() => { if(chatInput) {onSendMessage(activeChat.threadId, activeChat.item.id, chatInput, activeChat.item.title, activeChat.item.author); setChatInput('')} }} className="bg-indigo-600 text-white p-3.5 rounded-full shadow-md hover:bg-indigo-700 hover:scale-105 transition"><Send size={20}/></button>
                       </div>
                    </div>
                  )}
            </div>
          )}

          {activeTab === 'report' && (
            <div className="animate-fade-in space-y-8">
              <h3 className="font-black text-3xl text-gray-900 border-b-2 border-gray-100 pb-5 flex items-center"><ShieldAlert className="mr-3 text-orange-500" size={32}/> Hỗ trợ & Báo cáo Admin</h3>
              <div className="bg-blue-50 p-6 rounded-3xl border border-blue-200 shadow-sm relative overflow-hidden">
                <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                <h4 className="font-black text-blue-900 text-lg mb-2">Liên hệ Ban Chăm sóc người học (DSA)</h4>
                <p className="text-sm text-blue-800 font-bold leading-relaxed mb-4">
                  Để nắm thông tin một cách chính xác nhất và giải đáp thắc mắc chuyên sâu nhất có thể liên hệ với ban chăm sóc người học UEH với số điện thoại <span className="bg-blue-200 px-2 py-0.5 rounded text-blue-900">028 7306 1976</span> và email <span className="bg-blue-200 px-2 py-0.5 rounded text-blue-900">dsa@ueh.edu.vn</span>.
                </p>
              </div>
              <div className="bg-white">
                <p className="text-sm text-gray-600 font-bold bg-orange-50 p-4 rounded-xl border border-orange-100 mb-5">Điền form khiếu nại với Admin nếu bạn gặp vấn đề trên nền tảng.</p>
                <form className="space-y-5" onSubmit={handleReportSubmit}>
                  <select className="w-full p-4 border border-gray-300 rounded-xl outline-none bg-white focus:border-blue-500 text-sm font-bold shadow-sm" value={reportFormData.issue} onChange={(e) => setReportFormData({...reportFormData, issue: e.target.value})}>
                    <option value="Nghi ngờ lừa đảo / Tống tiền">Nghi ngờ lừa đảo / Tống tiền</option>
                    <option value="Bài đăng có thông tin giả mạo">Bài đăng có thông tin giả mạo</option>
                    <option value="Lỗi hệ thống website">Lỗi hệ thống website</option>
                    <option value="Vấn đề cá nhân khác">Vấn đề cá nhân khác</option>
                  </select>
                  <textarea required rows="5" placeholder="Chi tiết vấn đề bạn gặp phải..." className="w-full p-4 border border-gray-300 rounded-xl outline-none focus:border-blue-500 text-sm font-medium shadow-sm" value={reportFormData.details} onChange={(e) => setReportFormData({...reportFormData, details: e.target.value})}></textarea>
                  <button type="submit" className="bg-orange-500 hover:bg-orange-600 text-white font-black px-6 py-4 rounded-xl text-base w-full transition shadow-lg hover:-translate-y-1">Gửi khiếu nại cho Admin</button>
                </form>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const ProfileTabBtn = ({ active, onClick, icon, label, badge }) => (
  <button onClick={onClick} className={`flex items-center justify-between p-4 m-1 text-sm font-extrabold transition-all rounded-xl ${active ? 'bg-blue-50 text-blue-800 shadow-sm' : 'bg-transparent text-gray-600 hover:bg-gray-50'}`}>
    <div className="flex items-center">{React.cloneElement(icon, {className: `mr-4 ${active ? 'text-blue-600' : 'text-gray-400'}`})} {label}</div>
    {badge && <span className="bg-red-500 text-white text-[10px] font-black px-2.5 py-1 rounded-full shadow-sm">{badge}</span>}
  </button>
);

const InfoField = ({ icon, label, value, isSuccess }) => (
  <div className="bg-white p-5 rounded-3xl border border-gray-100 flex items-start space-x-4 shadow-sm hover:shadow-md transition-shadow">
    <div className={`mt-0.5 bg-gray-50 p-2.5 rounded-xl border border-gray-100 ${isSuccess ? 'text-green-500' : 'text-gray-400'}`}>{icon}</div>
    <div className="flex-grow min-w-0">
       <p className="text-xs text-gray-500 mb-1 font-bold uppercase tracking-wider">{label}</p>
       <p className={`text-base font-black truncate ${isSuccess ? 'text-green-700' : 'text-gray-900'}`}>{value || '---'}</p>
    </div>
  </div>
);

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
