<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UEH Reconnect - Nền tảng kết nối tìm đồ thất lạc</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f3f4f6; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    .bg-pattern { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
    .bg-sticker-star { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="%23fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>'); }
    .bg-sticker-cloud { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="150" height="150" viewBox="0 0 24 24" fill="none" stroke="%2393c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path></svg>'); }
    .bg-sticker-search { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%23fca5a5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>'); }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Search, MapPin, Clock, Tag, MessageSquare, User, BarChart2, 
      Home, AlertCircle, CheckCircle, Image as ImageIcon, 
      Send, ChevronRight, ChevronLeft, Filter, X, Phone, Mail, ShieldAlert, History, MessageCircle, FileText, Trophy, Lock, Camera, Calendar, HeartHandshake, Edit3, Save, CheckSquare, Sparkles, Smile, Heart
    } from 'lucide-react';
    
    // --- FIREBASE IMPORTS ---
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, updateDoc } from 'firebase/firestore';

    // --- HẰNG SỐ & HÀM TIỆN ÍCH ---
    const CATEGORIES = ['Laptop / Macbook', 'Điện thoại thông minh', 'Tai nghe / AirPods', 'Thẻ xe / Thẻ SV', 'Quần áo / Balo', 'Tài liệu học tập', 'Ví tiền / Giấy tờ', 'Chìa khóa xe', 'Khác'];
    const CAMPUSES = ['Cơ sở A (Nguyễn Đình Chiểu)', 'Cơ sở B (Nguyễn Tri Phương)', 'Cơ sở N (Nguyễn Văn Linh)', 'Cơ sở V (Võ Văn Tần)', 'Ký túc xá (Trần Hưng Đạo)'];
    const TIME_FRAMES = ['Sáng (07:00 - 11:30)', 'Chiều (13:00 - 17:30)', 'Tối (18:00 - 21:00)', 'Không rõ'];
    
    const CURRENT_REAL_DATE = new Date(); 

    const formatDateString = (dateObj) => {
      if (!dateObj) return '';
      const days = ['Chủ Nhật', 'Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7'];
      return `${days[dateObj.getDay()]}, ${dateObj.getDate().toString().padStart(2, '0')}/${(dateObj.getMonth()+1).toString().padStart(2, '0')}/${dateObj.getFullYear()}`;
    };

    const timeAgo = (timestamp) => {
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'Vừa xong';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes} phút trước`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours} giờ trước`;
      const days = Math.floor(hours / 24);
      return `${days} ngày trước`;
    };

    const getCategoryImage = (category) => {
      if (category.includes('Laptop')) return 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600&q=80';
      if (category.includes('Điện thoại')) return 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=600&q=80';
      if (category.includes('Tai nghe')) return 'https://images.unsplash.com/photo-1588423771073-b8903fbb85b5?w=600&q=80';
      if (category.includes('Ví tiền')) return 'https://images.unsplash.com/photo-1627123424574-724758594e93?w=600&q=80';
      if (category.includes('Thẻ xe')) return 'https://images.unsplash.com/photo-1633265486064-086b219458ce?w=600&q=80';
      return 'https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=600&q=80'; 
    };

    const calculateSimilarity = (str1, str2) => {
      if (!str1 || !str2) return 0;
      const s1 = str1.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(Boolean);
      const s2 = str2.toLowerCase().replace(/[^\w\s]/g, '').split(/\s+/).filter(Boolean);
      if(s1.length === 0 || s2.length === 0) return 0;
      const set1 = new Set(s1);
      const set2 = new Set(s2);
      const intersection = new Set([...set1].filter(x => set2.has(x)));
      const union = new Set([...set1, ...set2]);
      return (intersection.size / union.size) * 100;
    };

    // ==========================================
    // CẤU HÌNH FIREBASE THỰC TẾ
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDLdYXKyVJc6UQhToJ4UnNOnNzSn-c2U5g",
      authDomain: "uehreconnect.firebaseapp.com",
      projectId: "uehreconnect",
      storageBucket: "uehreconnect.firebasestorage.app",
      messagingSenderId: "610562676080",
      appId: "1:610562676080:web:92f1076c114417cde6abb5",
      measurementId: "G-R397Q4CHX1"
    };
    
    const appId = 'ueh-reconnect-app';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // AI Key (Tùy chọn)
    const apiKey = ""; 
    const callGeminiWithRetry = async (payload, retries = 5) => {
      const delay = (ms) => new Promise(res => setTimeout(res, ms));
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      for (let i = 0; i < retries; i++) {
        try {
          const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (i === retries - 1) throw error;
          await delay(Math.pow(2, i) * 1000);
        }
      }
    };

    // ==========================================
    // COMPONENT CHÍNH (APP)
    // ==========================================
    function App() {
      const [hasAcceptedDisclaimer, setHasAcceptedDisclaimer] = useState(false);
      const [disclaimerInput, setDisclaimerInput] = useState('');

      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [firebaseUser, setFirebaseUser] = useState(null);

      const [currentView, setCurrentView] = useState('home');
      const [items, setItems] = useState([]);
      const [messages, setMessages] = useState([]);
      const [selectedItem, setSelectedItem] = useState(null);
      
      const [calendarDate, setCalendarDate] = useState(new Date(CURRENT_REAL_DATE));
      const [browseFilter, setBrowseFilter] = useState('all');
      const [navToChat, setNavToChat] = useState(null);

      // Theo dõi trạng thái đăng nhập Firebase Auth
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          setFirebaseUser(user);
          if (user) {
            // Lấy thông tin user từ Firestore
            const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'ueh_users', user.email.replace(/[@.]/g, '_'));
            const docSnap = await getDoc(userDocRef);
            if (docSnap.exists()) {
              setCurrentUser(docSnap.data());
              setIsLoggedIn(true);
            }
          } else {
            setCurrentUser(null);
            setIsLoggedIn(false);
          }
        });
        return () => unsubscribe();
      }, []);

      // Lắng nghe dữ liệu
      useEffect(() => {
        const itemsRef = collection(db, 'artifacts', appId, 'public', 'data', 'ueh_items');
        const unsubItems = onSnapshot(itemsRef, (snapshot) => {
          const fetchedItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setItems(fetchedItems.sort((a,b) => b.timestamp - a.timestamp));
        });

        const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'ueh_messages');
        const unsubMsgs = onSnapshot(msgsRef, (snapshot) => {
          const fetchedMsgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setMessages(fetchedMsgs.sort((a,b) => a.timestamp - b.timestamp));
        });

        return () => { unsubItems(); unsubMsgs(); };
      }, []);

      const handleAddItem = async (newItem) => {
        if (!currentUser) return;
        const finalImage = newItem.image || getCategoryImage(newItem.category);
        const itemData = { 
          ...newItem, image: finalImage, status: 'open', 
          author: currentUser.name, authorEmail: currentUser.email, timestamp: Date.now() 
        };
        try {
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ueh_items'), itemData);
          setCurrentView('home'); 
        } catch (error) { console.error(error); }
      };

      const handleSendMessage = async (threadId, itemId, text, itemTitle, itemAuthor) => {
        if (!currentUser) return;
        const newMessage = { 
          threadId: threadId || null, 
          itemId, itemTitle: itemTitle || '', itemAuthor: itemAuthor || '',
          sender: currentUser.name, senderEmail: currentUser.email,
          text, timestamp: Date.now(), reactions: [] 
        };
        try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ueh_messages'), newMessage); } 
        catch (error) { console.error(error); }
      };

      const handleReaction = async (msgId, emoji) => {
        try {
          const msgRef = doc(db, 'artifacts', appId, 'public', 'data', 'ueh_messages', msgId);
          const msgSnap = await getDoc(msgRef);
          if (msgSnap.exists()) {
             let currentReactions = msgSnap.data().reactions || [];
             currentReactions.push(emoji);
             await updateDoc(msgRef, { reactions: currentReactions });
          }
        } catch (error) { console.error(error); }
      };

      const handleInitiateClaim = async (item, isLost) => {
        if (!isLoggedIn) { alert("Vui lòng đăng nhập ở mục Cá nhân để xác nhận!"); return; }
        if (currentUser.email === item.authorEmail) { alert("Bạn không thể tự xác nhận bài của chính mình!"); return; }

        const confirmMsg = isLost 
            ? "Bạn xác nhận mình đã nhặt được món đồ này?\nHệ thống sẽ tạo một đoạn chat và gửi thông báo đến người mất đồ." 
            : "Bạn xác nhận đây là đồ của bạn?\nHệ thống sẽ tạo một đoạn chat và gửi thông báo đến người nhặt được đồ.";
            
        if (window.confirm(confirmMsg)) {
            const emails = [currentUser.email, item.authorEmail].sort();
            const threadId = `${item.id}_${emails[0]}_${emails[1]}`;
            
            const autoMsg = isLost
                ? `Xin chào người đẹp, mình xin xác nhận đồ trong tin thông báo mà bạn đã đăng mình đã nhặt được, vui lòng bạn liên hệ đến mình sớm nhất nhé!\n\n[Thông tin liên hệ của mình]\n- Họ tên: ${currentUser.name}\n- SĐT: ${currentUser.phone}`
                : `Xin chào người đẹp, mình xin xác nhận đó thông tin đồ mà bạn đăng tải chính là đồ của tôi, mong bạn liên hệ với mình sớm nhé!\n\n[Thông tin liên hệ của mình]\n- Họ tên: ${currentUser.name}\n- SĐT: ${currentUser.phone}`;
            
            await handleSendMessage(threadId, item.id, autoMsg, item.title, item.author);
            alert("Tuyệt vời! Đã gửi tin nhắn tự động thành công.");
            
            setNavToChat({ item, threadId, otherPerson: item.author });
            setCurrentView('profile');
        }
      };

      const openPrivateChat = (item) => {
        if (!isLoggedIn) { alert("Vui lòng đăng nhập để gửi tin nhắn cá nhân!"); return; }
        if (currentUser.email === item.authorEmail) { alert("Đây là bài đăng của bạn!"); return; }
        const emails = [currentUser.email, item.authorEmail].sort();
        const threadId = `${item.id}_${emails[0]}_${emails[1]}`;
        setNavToChat({ item, threadId, otherPerson: item.author });
        setCurrentView('profile');
      };

      const handleResolveItem = async (itemObj) => {
        try {
          const itemRef = doc(db, 'artifacts', appId, 'public', 'data', 'ueh_items', itemObj.id);
          await updateDoc(itemRef, { status: 'resolved', resolvedBy: currentUser.name, resolvedAt: Date.now() });
          
          const targetType = itemObj.type === 'lost' ? 'found' : 'lost';
          // Tìm bài đối ứng, bỏ qua bài hiện tại và bài đã resolve
          const counterparts = items.filter(i => i.type === targetType && i.status !== 'resolved' && i.id !== itemObj.id);
          
          let matchedCount = 0;
          for (const cp of counterparts) {
            let filterScore = 0;
            if (cp.category === itemObj.category) filterScore++;
            if (cp.campus === itemObj.campus) filterScore++;
            if (cp.timeFrame === itemObj.timeFrame) filterScore++;
            
            const txtMatchPercent = calculateSimilarity(
                itemObj.title + " " + itemObj.description, 
                cp.title + " " + cp.description
            );
            
            if (filterScore >= 2 && txtMatchPercent >= 70) {
               await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ueh_items', cp.id), { 
                 status: 'resolved', resolvedAuto: true, resolvedMatchedWith: itemObj.id, resolvedAt: Date.now() 
               });
               matchedCount++;
            }
          }
          alert(`Đã đánh dấu giải quyết thành công! Đã ẩn bài khỏi tìm kiếm.${matchedCount > 0 ? `\nHệ thống cũng đã tự động gỡ ${matchedCount} bài đăng đối ứng vì có độ trùng khớp cao.` : ''}`);
          setCurrentView('home');
        } catch (error) { console.error("Lỗi:", error); }
      };

      const viewItemDetail = (item) => { setSelectedItem(item); setCurrentView('detail'); };

      const getBackgroundClass = () => {
        switch (currentView) {
          case 'home': return 'bg-blue-900/80';
          case 'browse': return browseFilter === 'found' ? 'bg-blue-900/80' : 'bg-teal-900/80';
          case 'stats': return 'bg-red-900/80';
          case 'report_lost': return 'bg-red-900/90'; 
          case 'report_found': return 'bg-blue-900/80';
          case 'detail': return selectedItem?.type === 'found' ? 'bg-blue-900/80' : 'bg-teal-900/80';
          case 'profile': return 'bg-blue-900/80';
          default: return 'bg-gray-900/80';
        }
      };

      if (!hasAcceptedDisclaimer) {
        return (
          <div className="fixed inset-0 bg-gray-900/90 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-fade-in">
            <div className="bg-white p-8 rounded-3xl max-w-lg w-full shadow-2xl relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 via-green-600 to-orange-500"></div>
              <div className="flex items-center justify-center mb-6">
                <ShieldAlert size={48} className="text-orange-500" />
              </div>
              <h2 className="text-2xl font-bold text-center text-gray-900 mb-4">Chào mừng bạn đến với<br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-green-500 to-orange-500">UEH Reconnect!</span></h2>
              
              <div className="text-sm text-gray-700 space-y-3 mb-6 bg-orange-50 p-5 rounded-xl border border-orange-100 leading-relaxed text-justify">
                <p><strong>Xin lưu ý:</strong> Nền tảng này được xây dựng với mục đích hỗ trợ cộng đồng sinh viên UEH kết nối và tìm lại đồ thất lạc.</p>
                <p>Tuy nhiên, chúng tôi <strong>không thể đảm bảo 100%</strong> khả năng tìm lại được tài sản. Việc tìm lại đồ phụ thuộc vào rất nhiều yếu tố khách quan và chủ quan như: người nhặt được không có chủ ý báo cáo đồ đã nhặt được lên hệ thống, người bị mất đồ không chủ động theo dõi và cập nhật website thường xuyên, cùng các yếu tố ngoại cảnh khác.</p>
                <p className="font-semibold text-orange-800">Vui lòng gõ cụm từ <span className="bg-orange-200 px-1 rounded font-bold">TOIXACNHANDONGY</span> (viết liền không dấu) vào ô bên dưới để xác nhận bạn đã hiểu và đồng ý.</p>
              </div>

              <div className="space-y-4">
                <input 
                  type="text" 
                  placeholder="Nhập TOIXACNHANDONGY..."
                  className="w-full p-3 border border-gray-300 rounded-xl text-center font-bold tracking-wider focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none uppercase bg-gray-50"
                  value={disclaimerInput}
                  onChange={(e) => setDisclaimerInput(e.target.value.toUpperCase())}
                />
                <button 
                  onClick={() => { if(disclaimerInput === 'TOIXACNHANDONGY') setHasAcceptedDisclaimer(true); }}
                  disabled={disclaimerInput !== 'TOIXACNHANDONGY'}
                  className={`w-full py-3.5 rounded-xl font-bold transition-all ${disclaimerInput === 'TOIXACNHANDONGY' ? 'bg-gradient-to-r from-blue-600 to-green-600 text-white shadow-lg hover:shadow-xl hover:scale-[1.02]' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                >
                  Tiếp Tục Truy Cập
                </button>
              </div>
            </div>
          </div>
        );
      }

      const renderContent = () => {
        switch (currentView) {
          case 'home': return <HomeView setView={setCurrentView} items={items} viewItemDetail={viewItemDetail} calendarDate={calendarDate} setCalendarDate={setCalendarDate} />;
          case 'report_lost': return <ReportForm type="lost" onSubmit={handleAddItem} onCancel={() => setCurrentView('home')} currentUser={currentUser} isLoggedIn={isLoggedIn} setView={setCurrentView} />;
          case 'report_found': return <ReportForm type="found" onSubmit={handleAddItem} onCancel={() => setCurrentView('home')} currentUser={currentUser} isLoggedIn={isLoggedIn} setView={setCurrentView} />;
          case 'browse': return <BrowseView items={items} viewItemDetail={viewItemDetail} calendarDate={calendarDate} setCalendarDate={setCalendarDate} filterType={browseFilter} setFilterType={setBrowseFilter} />;
          case 'detail': return <ItemDetail item={selectedItem} allItems={items} messages={messages} onSendMessage={handleSendMessage} goBack={() => setCurrentView('browse')} viewItemDetail={viewItemDetail} currentUser={currentUser} isLoggedIn={isLoggedIn} handleResolveItem={handleResolveItem} handleInitiateClaim={handleInitiateClaim} openPrivateChat={openPrivateChat} />;
          case 'stats': return <StatsView items={items} />;
          case 'profile': return <ProfileView user={currentUser} items={items} messages={messages} onSendMessage={handleSendMessage} onReaction={handleReaction} isLoggedIn={isLoggedIn} setCurrentUser={setCurrentUser} db={db} appId={appId} navToChat={navToChat} setNavToChat={setNavToChat} isConfigured={true} />;
          default: return <HomeView setView={setCurrentView} items={items} viewItemDetail={viewItemDetail} calendarDate={calendarDate} setCalendarDate={setCalendarDate} />;
        }
      };

      return (
        <div className={`min-h-screen font-sans text-gray-800 flex flex-col relative transition-colors duration-700 bg-pattern`}>
          <div className={`fixed inset-0 z-[-1] transition-colors duration-700 ${getBackgroundClass()}`}></div>
          <div className="fixed inset-0 z-[-2] opacity-30 pointer-events-none" style={{backgroundImage: "url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?w=1600&q=80')", backgroundSize: 'cover', backgroundPosition: 'center', backgroundAttachment: 'fixed'}}></div>
          
          <header className="bg-white/95 backdrop-blur-md shadow-md sticky top-0 z-50 border-b border-gray-100">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16">
                <div className="flex items-center cursor-pointer group" onClick={() => setCurrentView('home')}>
                  <div className="mr-3 h-10 flex items-center justify-center rounded overflow-hidden">
                     <img src="https://future.ueh.edu.vn/wp-content/uploads/2023/08/UEH-Logo.png" alt="UEH Logo" className="h-full object-contain" onError={(e) => { e.target.src = "https://smart.ueh.edu.vn/Content/logo/logo-ueh-en.png"; }} />
                  </div>
                  <HeartHandshake className="text-orange-500 mr-2 group-hover:scale-110 transition-transform" size={32} />
                  <span className="font-extrabold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-green-500 to-orange-500 hidden sm:block tracking-tight">
                    UEH Reconnect
                  </span>
                </div>
                
                <nav className="hidden md:flex space-x-8 items-center">

    const MiniCalendar = ({ calendarDate, setCalendarDate }) => {
      const currentYear = CURRENT_REAL_DATE.getFullYear();
      const currentMonth = CURRENT_REAL_DATE.getMonth();
      const currentDate = CURRENT_REAL_DATE.getDate();

      const [viewYear, setViewYear] = useState(calendarDate.getFullYear());
      const [viewMonth, setViewMonth] = useState(calendarDate.getMonth());

      useEffect(() => {
        setViewYear(calendarDate.getFullYear());
        setViewMonth(calendarDate.getMonth());
      }, [calendarDate]);

      const handleYearChange = (e) => {
        const y = Number(e.target.value);
        setViewYear(y);
        if (y === currentYear && viewMonth > currentMonth) setViewMonth(currentMonth); 
      };

      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const firstDayIndex = new Date(viewYear, viewMonth, 1).getDay(); 
      const firstDayVietnam = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 

      const monthNames = ["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"];
      const availableYears = [2024, 2025, 2026, 2027].filter(y => y <= currentYear);

      return (
        <div className="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-6 shadow-2xl h-full flex flex-col justify-center w-full">
           <div className="flex items-center justify-between mb-6 gap-4">
              <h4 className="font-extrabold text-white text-xl flex items-center drop-shadow-md"><Calendar size={22} className="mr-2"/> Lịch tương tác</h4>
              <div className="flex gap-2">
                <select value={viewMonth} onChange={(e) => setViewMonth(Number(e.target.value))} className="bg-white/20 text-white font-bold text-sm rounded-xl px-3 py-2 outline-none border border-white/30 hover:bg-white/30 cursor-pointer shadow-inner">
                  {monthNames.map((name, idx) => (
                    <option key={idx} value={idx} disabled={viewYear === currentYear && idx > currentMonth} className="text-gray-900">{name}</option>
                  ))}
                </select>
                <select value={viewYear} onChange={handleYearChange} className="bg-white/20 text-white font-bold text-sm rounded-xl px-3 py-2 outline-none border border-white/30 hover:bg-white/30 cursor-pointer shadow-inner">
                  {availableYears.map(y => <option key={y} value={y} className="text-gray-900">{y}</option>)}
                </select>
              </div>
           </div>
           
           <div className="grid grid-cols-7 gap-2 text-center text-sm font-extrabold text-blue-100 mb-3 uppercase tracking-wider">
             <div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div><div>CN</div>
           </div>
           <div className="grid grid-cols-7 gap-2 flex-grow">
              {Array.from({ length: firstDayVietnam }).map((_, i) => (
                <div key={`empty-${i}`} className="w-full"></div>
              ))}
              {Array.from({ length: daysInMonth }).map((_, i) => {
                const day = i + 1;
                const isSelected = day === calendarDate.getDate() && viewMonth === calendarDate.getMonth() && viewYear === calendarDate.getFullYear();
                const checkDate = new Date(viewYear, viewMonth, day);
                const isFuture = checkDate > CURRENT_REAL_DATE;
                
                return (
                  <button 
                    key={day} disabled={isFuture}
                    onClick={() => setCalendarDate(new Date(viewYear, viewMonth, day))}
                    className={`w-full py-3 rounded-xl text-base font-extrabold transition-all border 
                      ${isFuture ? 'text-gray-400 opacity-20 cursor-not-allowed border-transparent bg-transparent' : 
                        isSelected ? 'bg-orange-500 text-white shadow-lg scale-105 border-orange-400 z-10' : 
                        'text-white hover:bg-white/20 hover:border-white/40 border-transparent bg-white/5 cursor-pointer shadow-sm'}`}
                  >
                    {day}
                  </button>
                );
              })}
           </div>
        </div>
      );
    };

    const ReportForm = ({ type, onSubmit, onCancel, currentUser, isLoggedIn, setView }) => {
      const isLost = type === 'lost';
      const [formData, setFormData] = useState({
        title: '', category: CATEGORIES[0], campus: CAMPUSES[0],
        specificLocation: '', date: CURRENT_REAL_DATE.toISOString().split('T')[0],
        timeFrame: TIME_FRAMES[0], description: '', image: null,
        reporterName: isLoggedIn && currentUser ? currentUser.name : '', 
        reporterPhone: isLoggedIn && currentUser ? currentUser.phone : '', 
        reporterEmail: isLoggedIn && currentUser ? currentUser.email : '', 
        reporterMajor: isLoggedIn && currentUser ? currentUser.major : '', 
        reporterClass: isLoggedIn && currentUser ? currentUser.classInfo : ''
      });
      const [aiInput, setAiInput] = useState('');
      const [isGenerating, setIsGenerating] = useState(false);
      const [previewImage, setPreviewImage] = useState(null);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setPreviewImage(reader.result);
            setFormData({...formData, image: reader.result});
          };
          reader.readAsDataURL(file);
        }
      };

      const handleAiFill = async () => {
        if (!aiInput.trim()) return;
        setIsGenerating(true);
        try {
          const payload = {
            contents: [{ parts: [{ text: `Trích xuất thông tin: "${aiInput}"` }] }],
            systemInstruction: { parts: [{ text: `Trả về JSON. Danh mục: [${CATEGORIES.join(', ')}]. Cơ sở: [${CAMPUSES.join(', ')}]. Khung giờ: [${TIME_FRAMES.join(', ')}].` }] },
            generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { title: { type: "STRING" }, category: { type: "STRING" }, campus: { type: "STRING" }, specificLocation: { type: "STRING" }, timeFrame: { type: "STRING" }, description: { type: "STRING" } } } }
          };
          const result = await callGeminiWithRetry(payload);
          const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (textResponse) {
            const parsed = JSON.parse(textResponse);
            setFormData(prev => ({ ...prev, ...parsed }));
          }
        } catch (error) { console.error(error); } finally { setIsGenerating(false); }
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        onSubmit({ ...formData, type });
      };

      return (
        <div className="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-hidden animate-slide-up relative">
          
          {!isLoggedIn && (
            <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-white/70 backdrop-blur-md">

                 <p className="text-gray-600 font-medium mb-6">Bạn cần có tài khoản sinh viên để đăng thông báo nhằm đảm bảo thông tin liên lạc được chính xác.</p>
                 <button onClick={() => setView('profile')} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl transition shadow-lg">Tạo Tài Khoản Ngay</button>
               </div>
            </div>
